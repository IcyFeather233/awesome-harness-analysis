<g class="story-node" data-id="stance-thin" data-hir="" data-evidence="D-001,D-003" data-claims="C-002,C-010">
<title>stance-thin: HIR ; evidence D-001,D-003</title>
<rect x="70.0" y="165.0" width="350.0" height="96.0" rx="10" fill="#FDE7DC" stroke="#C65D35" stroke-width="3"/>
<text x="88.0" y="196.0" class="node-label" fill="#431407">Thin generic core</text>
<text x="88.0" y="227.0" class="node-subtitle" fill="#431407">Keep model decisions in the model</text>
</g>
<g class="story-node" data-id="mechanism-thin" data-hir="N-LowLoop,N-AgentSession,N-AgentHarness" data-evidence="S-001,S-011,X-002" data-claims="C-002,C-010">
<title>mechanism-thin: HIR N-LowLoop,N-AgentSession,N-AgentHarness; evidence S-001,S-011,X-002</title>
<rect x="625.0" y="165.0" width="350.0" height="96.0" rx="10" fill="#FFF0E6" stroke="#C2410C" stroke-width="3"/>
<text x="643.0" y="196.0" class="node-label" fill="#431407">runAgentLoop + orchestration</text>
<text x="643.0" y="227.0" class="node-subtitle" fill="#431407">One loop, two product layers</text>
</g>
<g class="story-node" data-id="tradeoff-thin" data-hir="" data-evidence="D-008,S-011" data-claims="C-010">
<title>tradeoff-thin: HIR ; evidence D-008,S-011</title>
<rect x="1180.0" y="165.0" width="350.0" height="96.0" rx="10" fill="#FEF3C7" stroke="#B45309" stroke-width="3"/>
<text x="1198.0" y="196.0" class="node-label" fill="#451A03">Composable, but split ownership</text>
<text x="1198.0" y="227.0" class="node-subtitle" fill="#451A03">Migration and parity become architecture work</text>
</g>
<g class="story-node" data-id="stance-extension" data-hir="" data-evidence="D-004" data-claims="C-004,C-013">
<title>stance-extension: HIR ; evidence D-004</title>
<rect x="70.0" y="310.0" width="350.0" height="96.0" rx="10" fill="#FDE7DC" stroke="#C65D35" stroke-width="3"/>
<text x="88.0" y="341.0" class="node-label" fill="#431407">Extension over built-ins</text>
<text x="88.0" y="372.0" class="node-subtitle" fill="#431407">MCP, subagent and policy are optional</text>
</g>
<g class="story-node" data-id="mechanism-extension" data-hir="N-ToolRegistry,N-Hooks,N-SubagentPlugin" data-evidence="S-003,S-015,S-017" data-claims="C-004,C-017">
<title>mechanism-extension: HIR N-ToolRegistry,N-Hooks,N-SubagentPlugin; evidence S-003,S-015,S-017</title>
<rect x="625.0" y="310.0" width="350.0" height="96.0" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
<text x="643.0" y="341.0" class="node-label" fill="#172554">Registry + lifecycle hooks</text>
<text x="643.0" y="372.0" class="node-subtitle" fill="#172554">Capabilities merge at runtime</text>
</g>
<g class="story-node" data-id="tradeoff-extension" data-hir="" data-evidence="D-002,S-017" data-claims="C-005,C-017">
<title>tradeoff-extension: HIR ; evidence D-002,S-017</title>
<rect x="1180.0" y="310.0" width="350.0" height="96.0" rx="10" fill="#FEF3C7" stroke="#B45309" stroke-width="3"/>
<text x="1198.0" y="341.0" class="node-label" fill="#451A03">Flexible, but policy can fragment</text>
<text x="1198.0" y="372.0" class="node-subtitle" fill="#451A03">Optional hooks are not a global boundary</text>
</g>
<g class="story-node" data-id="stance-isolation" data-hir="" data-evidence="D-002,D-007" data-claims="C-005,C-007">
<title>stance-isolation: HIR ; evidence D-002,D-007</title>
<rect x="70.0" y="455.0" width="350.0" height="96.0" rx="10" fill="#FDE7DC" stroke="#C65D35" stroke-width="3"/>
<text x="88.0" y="486.0" class="node-label" fill="#431407">Externalize isolation</text>
<text x="88.0" y="517.0" class="node-subtitle" fill="#431407">Do not imply an in-process sandbox</text>
</g>
<g class="story-node" data-id="mechanism-isolation" data-hir="N-Bash,N-Workspace,N-ExternalSandbox" data-evidence="S-007,D-007" data-claims="C-005,C-007">
<title>mechanism-isolation: HIR N-Bash,N-Workspace,N-ExternalSandbox; evidence S-007,D-007</title>
<rect x="625.0" y="455.0" width="350.0" height="96.0" rx="10" fill="#F3F4F6" stroke="#52525B" stroke-width="3"/>
<text x="643.0" y="486.0" class="node-label" fill="#18181B">Host process + optional container</text>
<text x="643.0" y="517.0" class="node-subtitle" fill="#18181B">Whole-process or routed-tool isolation</text>
</g>
<g class="story-node" data-id="tradeoff-isolation" data-hir="" data-evidence="D-002,D-007" data-claims="C-007,C-017">
<title>tradeoff-isolation: HIR ; evidence D-002,D-007</title>
<rect x="1180.0" y="455.0" width="350.0" height="96.0" rx="10" fill="#FEE2E2" stroke="#B91C1C" stroke-width="3"/>
<text x="1198.0" y="486.0" class="node-label" fill="#450A0A">Honest boundary, deployment burden</text>
<text x="1198.0" y="517.0" class="node-subtitle" fill="#450A0A">Custom tools can escape partial routing</text>
</g>
<g class="story-node" data-id="stance-state" data-hir="" data-evidence="S-008" data-claims="C-008,C-012">
<title>stance-state: HIR ; evidence S-008</title>
<rect x="70.0" y="600.0" width="350.0" height="96.0" rx="10" fill="#FDE7DC" stroke="#C65D35" stroke-width="3"/>
<text x="88.0" y="631.0" class="node-label" fill="#431407">Append-oriented durable state</text>
<text x="88.0" y="662.0" class="node-subtitle" fill="#431407">Preserve branches and summaries</text>
</g>
<g class="story-node" data-id="mechanism-state" data-hir="N-Session,N-SessionStore,N-Compactor" data-evidence="S-008,S-009,R-004" data-claims="C-008,C-009">
<title>mechanism-state: HIR N-Session,N-SessionStore,N-Compactor; evidence S-008,S-009,R-004</title>
<rect x="625.0" y="600.0" width="350.0" height="96.0" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="3"/>
<text x="643.0" y="631.0" class="node-label" fill="#14532D">JSONL tree + compaction entries</text>
<text x="643.0" y="662.0" class="node-subtitle" fill="#14532D">Active leaf reconstructs context</text>
</g>
<g class="story-node" data-id="tradeoff-state" data-hir="" data-evidence="S-008" data-claims="C-008">
<title>tradeoff-state: HIR ; evidence S-008</title>
<rect x="1180.0" y="600.0" width="350.0" height="96.0" rx="10" fill="#FEF3C7" stroke="#B45309" stroke-width="3"/>
<text x="1198.0" y="631.0" class="node-label" fill="#451A03">Auditable, not workspace-transactional</text>
<text x="1198.0" y="662.0" class="node-subtitle" fill="#451A03">Session branch does not roll back files</text>
</g>
<text x="40" y="796" class="footer">Left: documented stance | Center: recovered implementation | Right: observable tradeoff (analyst synthesis)</text>
