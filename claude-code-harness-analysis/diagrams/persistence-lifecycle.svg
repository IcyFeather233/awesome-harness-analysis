<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="876" height="498" viewBox="0 0 876 498" role="img">
<title>Persistence Lifecycle</title>
<desc>Transition between live state, durable state, restore, and recovery.</desc>
<defs>
