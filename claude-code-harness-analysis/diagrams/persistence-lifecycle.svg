.diagram-subtitle { font-size: 13px; fill: #475569; }
.group-title { font-size: 13px; font-weight: 700; fill: #334155; }
.node-name { font-size: 13px; font-weight: 700; }
.node-type { font-size: 11px; }
.edge-label { font-size: 10px; fill: #334155; paint-order: stroke; stroke: #FFFFFF; stroke-width: 4px; stroke-linejoin: round; }
.legend-title { font-size: 11px; font-weight: 700; fill: #334155; }
.legend-label { font-size: 10px; fill: #475569; }
</style>
